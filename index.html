// កូដថ្មីសម្រាប់ដាក់ក្នុង <script> នៃ index.html របស់លោកគ្រូ
// កូដនេះនឹងដោះស្រាយបញ្ហានៅលើ Vercel Deployment

function initAppCredentials() {
    // ប្រើ setTimeout ដើម្បីឱ្យប្រព័ន្ធអានទិន្នន័យពី Browser បានគ្រប់ជ្រុងជ្រោយសិន
    setTimeout(() => {
        const storedKey = localStorage.getItem('google_ai_studio_key');
        const storedModel = localStorage.getItem('google_ai_selected_model');
        
        if (storedKey && storedKey.trim() !== "") {
            userApiKey = storedKey.trim();
            console.log("Key ត្រូវបានអានដោយជោគជ័យពី Vercel Browser");
            checkApiKeyStatus(); // បិទ banner ភ្លាម
        } else {
            console.log("មិនទាន់រកឃើញ Key, កំពុងរង់ចាំការបំពេញ...");
            checkApiKeyStatus();
        }

        if (storedModel) {
            selectedModel = storedModel;
        }
    }, 500); // រង់ចាំ 0.5 វិនាទីដើម្បីធានាថា Browser ដំណើរការរួចរាល់
}

// ហៅមុខងារនេះពេលទំព័រផ្ទុកចប់
window.onload = function() {
    initAppCredentials();
};
