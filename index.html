            font-family: 'Khmer OS Muol Light', 'Noto Serif Khmer', serif;

        }
        
        .markdown-body ul { 
            list-style-type: none;

        }
        
        .markdown-body li { 
            margin-bottom: 0.65rem; 
            position: relative;
            padding-left: 1.75rem;
            line-height: 1.7;
            color: #475569;
            font-size: 0.95rem;
        }

            content: "\f058";

        .markdown-body strong {

            color: #0f172a; 
        }
        
        .status-box {
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: start;
            gap: 1rem;
            box-shadow: 0 4px 15px -3px rgba(15, 23, 42, 0.03);
            transition: all 0.3s ease;

<body class="text-slate-800 antialiased min-h-screen flex flex-col bg-slate-50 font-siemreap">

    <header class="bg-gradient-to-r from-blue-700 via-indigo-700 to-blue-800 text-white shadow-xl py-5 sticky top-0 z-40">
        <div class="container mx-auto px-4 flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center space-x-3.5">
                <div class="bg-white/10 p-2.5 rounded-xl backdrop-blur-md border border-white/20">
                    <i class="fas fa-shield-halved text-3xl text-emerald-400"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-muol tracking-wide">ប្រព័ន្ធពិនិត្យព័ត៌មាន និងរូបភាព</h1>
                    <p class="text-[11px] text-blue-200 uppercase tracking-widest font-semibold mt-0.5">AI-Powered Fact & Image Forensic Center</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
            <div class="flex border-b border-slate-200 bg-slate-50/80 p-1.5 gap-1.5">
                <button id="tab-text" class="flex-grow md:flex-initial py-3.5 px-6 rounded-2xl text-center font-bold text-blue-600 bg-white shadow-sm border border-slate-200/50 focus:outline-none transition-all-300 text-sm flex items-center justify-center gap-2" onclick="switchTab('text')">
                    <i class="fas fa-file-signature text-base text-blue-500"></i> ពិនិត្យអត្ថបទ / ព័ត៌មាន
                </button>
                <button id="tab-image" class="flex-grow md:flex-initial py-3.5 px-6 rounded-2xl text-center font-bold text-slate-500 hover:text-blue-600 hover:bg-white/60 focus:outline-none transition-all-300 text-sm flex items-center justify-center gap-2" onclick="switchTab('image')">
                    <i class="fas fa-images text-base text-slate-400"></i> ពិនិត្យរូបភាព AI
                </button>
            </div>

            <div class="p-6 md:p-8">
                <div id="section-text" class="block space-y-6">
                    <div>
                        <h2 class="text-base font-muol text-slate-800 flex items-center mb-1.5">
                            <span class="bg-blue-100 text-blue-600 rounded-xl w-7 h-7 inline-flex items-center justify-center text-sm mr-2.5 font-bold">១</span>
                            បញ្ចូលអត្ថបទព័ត៌មានដែលចង់ផ្ទៀងផ្ទាត់
                        </h2>
                        <textarea id="text-input" rows="8" class="w-full px-4 py-3.5 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all-300 text-sm leading-relaxed shadow-inner" placeholder="ឧទាហរណ៍៖ ក្តៅៗ! រដ្ឋាភិបាលប្រកាសចែកថេប្លេតឥតគិតថ្លៃ..."></textarea>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button onclick="analyzeText()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 px-8 rounded-2xl shadow-lg shadow-blue-500/25 flex items-center transition-all-300">
                            <i class="fas fa-magnifying-glass mr-2.5"></i> ចាប់ផ្តើមវិភាគព័ត៌មាន
                        </button>
                    </div>
                </div>

                <div id="section-image" class="hidden space-y-6">
                    <div id="drop-zone" class="border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center cursor-pointer hover:bg-blue-50/30 hover:border-blue-500 transition-all-300" onclick="document.getElementById('image-upload').click()">
                        <input type="file" id="image-upload" accept="image/jpeg, image/png, image/webp" class="hidden" onchange="handleImageUpload(event)">
                        <div id="upload-prompt" class="space-y-4">
                            <i class="fas fa-cloud-arrow-up text-3xl text-blue-600"></i>
                            <p class="text-slate-700 font-bold">ចុចទីនេះ ដើម្បីជ្រើសរើសរូបភាព</p>
                        </div>
                        <div id="image-preview-container" class="hidden mt-2 relative">
                            <img id="image-preview" src="" alt="Preview" class="max-h-80 mx-auto rounded-2xl shadow-lg object-contain">
                        </div>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button id="analyze-btn" onclick="analyzeImage()" class="bg-slate-300 text-slate-500 font-bold py-3.5 px-8 rounded-2xl shadow-md flex items-center transition-all-300 cursor-not-allowed" disabled>
                            <i class="fas fa-brain mr-2.5"></i> ចាប់ផ្តើមវិភាគរូបភាព
                        </button>
                    </div>
                </div>

                <div id="loading" class="hidden flex flex-col items-center justify-center py-16">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-16 w-16 mb-4"></div>
                    <p class="text-blue-600 font-bold" id="loading-text">កំពុងវិភាគ... សូមរង់ចាំ</p>
                </div>

                <div id="result-container" class="hidden mt-10 border-t border-slate-200/80 pt-8">
                    <div id="result-content" class="markdown-body"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = typeof MY_GEMINI_API_KEY !== 'undefined' ? MY_GEMINI_API_KEY : ""; 
        const GEMINI_MODEL = "gemini-1.5-flash"; 

        function switchTab(tab) {
            const sectionText = document.getElementById('section-text');
            const sectionImage = document.getElementById('section-image');
            if (tab === 'text') {
                sectionText.classList.replace('hidden', 'block');
                sectionImage.classList.replace('block', 'hidden');
            } else {
                sectionImage.classList.replace('hidden', 'block');
                sectionText.classList.replace('block', 'hidden');
            }
        }

        async function fetchGeminiAI(payload) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error("កំហុសក្នុងការតភ្ជាប់ទៅ Google Gemini API");
            return await response.json();
        }

        async function analyzeText() {
            const text = document.getElementById('text-input').value.trim();
            if (!text) return alert("សូមបញ្ចូលអត្ថបទ");
            document.getElementById('loading').classList.remove('hidden');
            try {
                const payload = { contents: [{ parts: [{ text: `ផ្ទៀងផ្ទាត់ព័ត៌មាន៖ ${text}` }] }] };
                const data = await fetchGeminiAI(payload);
                document.getElementById('result-content').innerHTML = data.candidates[0].content.parts[0].text;
                document.getElementById('result-container').classList.remove('hidden');
            } catch (e) {
                alert("បរាជ័យ៖ " + e.message);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
